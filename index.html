<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>翼攀微鉴 · 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 420px;
            max-width: 90%;
            padding: 2.5rem 2rem;
            background: rgba(10, 20, 35, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            border: 1px solid rgba(0, 255, 255, 0.5);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 200, 255, 0.2);
            text-align: center;
        }
        .logo {
            font-size: 2.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #aaffff, #2a9eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        h3 {
            font-weight: 400;
            letter-spacing: 1px;
            margin-bottom: 1.8rem;
            color: #bbddff;
        }
        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .input-group label {
            font-size: 0.8rem;
            color: #9bc0ff;
            display: block;
            margin-bottom: 6px;
        }
        .input-field {
            width: 100%;
            background: rgba(0, 10, 25, 0.6);
            border: 1px solid #2c5a8c;
            border-radius: 40px;
            padding: 0.9rem 1.2rem;
            color: #eef5ff;
            font-size: 1rem;
            outline: none;
        }
        .input-field:focus {
            border-color: #00ccff;
            box-shadow: 0 0 12px rgba(0, 200, 255, 0.3);
        }
        .login-btn {
            width: 100%;
            background: linear-gradient(95deg, #0077ff, #00c3ff);
            border: none;
            border-radius: 40px;
            padding: 0.9rem;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
        }
        .login-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 18px #00aaff;
        }
        .error-msg {
            color: #ff8888;
            font-size: 0.8rem;
            margin-top: 1rem;
            background: rgba(255, 0, 0, 0.1);
            padding: 0.4rem;
            border-radius: 40px;
            display: none;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="logo"><i class="fas fa-plane-departure"></i> 翼攀微鉴</div>
    <h3>· 智慧航空运维平台 ·</h3>
    <div class="input-group">
        <label>用户名</label>
        <input type="text" id="username" class="input-field" placeholder="工号 / 邮箱">
    </div>
    <div class="input-group">
        <label>密码</label>
        <input type="password" id="password" class="input-field" placeholder="••••••••">
    </div>
    <button id="loginBtn" class="login-btn">登录系统</button>
    <div id="errorMsg" class="error-msg"></div>
</div>

<script>
    // 登录验证逻辑：固定账号 202430801111 / 123456
    const loginBtn = document.getElementById('loginBtn');
    const errorDiv = document.getElementById('errorMsg');

    function doLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        
        // 只有完全匹配才能登录
        if (username === '202430801111' && password === '123456') {
            // 可选：保存登录状态
            localStorage.setItem('loggedUser', username);
            // 跳转到主页面
            window.location.href = 'dashboard.html';
        } else {
            errorDiv.style.display = 'block';
            errorDiv.innerText = '❌ 用户名或密码错误';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 2000);
        }
    }

    loginBtn.addEventListener('click', doLogin);
    // 按回车键也能登录
    document.getElementById('password').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') doLogin();
    });
</script>
<!-- 字体图标 -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</body>
</html>
